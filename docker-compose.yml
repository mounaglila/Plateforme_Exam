services:
  # ====== BACKEND ======
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edusmart-backend
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - edusmart-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ====== FRONTEND ======
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edusmart-frontend
    ports:
      - "80:80"
    #environment:
      #REACT_APP_API_BASE: http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - edusmart-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
networks:
  edusmart-network:
    driver: bridge
